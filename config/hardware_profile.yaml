# config/hardware_profile.yaml
#
# Mac-specific serving settings (PRD v3.1). Centralises the knobs that Sam must
# tune against real hardware so they are not scattered through the code.
#
# Target: MacBook Pro M5, 32GB unified memory, Apple Metal acceleration.

hardware:
  name: "MacBook Pro M5"
  total_memory_gb: 32
  accelerator: "metal"        # metal | cuda | cpu
  # Rough memory budget (see PRD "Total VRAM Usage"):
  #   2x 7B GGUF (~8.3GB) + runtime overhead (~2GB) ~= 10-11GB for judges,
  #   leaving ~20GB for test-model inference + analysis.
  reserved_for_judges_gb: 11

# Default in-process llama.cpp engine parameters. Passed to
# `llama_cpp.Llama(model_path=..., **x)` (harness/llamacpp_engine.py) for every
# GGUF checkpoint served with `engine: llamacpp` / `access: llamacpp`. This is the
# local serving backend: GGUF-native (points at a specific quant file) and loads
# models sequentially. SAM MUST VERIFY these against the M5.
llamacpp_defaults:
  n_ctx: 2048                    # context window
  n_gpu_layers: -1               # -1 => offload all layers to Metal
  n_batch: 512                   # prompt batch size
  verbose: false

# llama.cpp serving policy (harness-only, not passed to `Llama(...)`).
llamacpp:
  # How many models may be resident in memory at once. 1 => strict sequential
  # loading: loading a model frees the previously-loaded one first, so a test
  # model and the judges never all hold weights simultaneously. Raise to 2 to
  # keep both local judges resident if the memory budget allows.
  max_resident: 1
