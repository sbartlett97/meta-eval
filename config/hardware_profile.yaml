# config/hardware_profile.yaml
#
# Mac-specific serving settings (PRD v3.1). Centralises the knobs that Sam must
# tune against real hardware so they are not scattered through the code.
#
# Target: MacBook Pro M5, 32GB unified memory, Apple Metal acceleration.

hardware:
  name: "MacBook Pro M5"
  total_memory_gb: 32
  accelerator: "metal"        # metal | cuda | cpu
  # Rough memory budget (see PRD "Total VRAM Usage"):
  #   2x 7B GGUF (~8.3GB) + vLLM overhead (~2GB) ~= 10-11GB for judges,
  #   leaving ~20GB for test-model inference + analysis.
  reserved_for_judges_gb: 11

# Default in-process vLLM engine parameters. Passed to `vllm.LLM(model=..., **x)`
# (harness/vllm_engine.py) for every local checkpoint. SAM MUST VERIFY these
# against the M5 (PRD review checklist).
vllm_defaults:
  tensor_parallel_size: 1        # single device
  gpu_memory_utilization: 0.8    # fraction of unified memory per engine
  max_model_len: 2048            # context window
  dtype: "auto"                  # infer from checkpoint
  enable_prefix_caching: true    # reuse shared prompt prefixes
  # quantization: "gguf"         # uncomment if vLLM needs an explicit hint
