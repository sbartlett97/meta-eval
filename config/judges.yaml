# config/judges.yaml
#
# Judge panel configuration (PRD v3.1).
#
# Every judge -- remote or local -- is invoked through the SAME HTTP-based
# interface (see PRD "Judge Calls (All via API)"). The only exception is the
# deterministic heuristic baseline, which runs in-process.
#
# `access` values:
#   api    -> hosted provider endpoint (Anthropic / OpenAI / Replicate)
#   vllm   -> local vLLM OpenAI-compatible server (localhost:<vllm_port>)
#   none   -> deterministic, no network call
#
# `priority` is used by the panel to select a subset when running cheap/fast
# pilots (lower number = run first / always). See PRD "Decision 3: Judge
# Placement".

judges:
  # ---- Remote judges (hosted API) --------------------------------------
  - id: "claude-sonnet-4-6"
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    access: "api"
    cost_per_1k_tokens: 0.003
    priority: 1
    enabled: true

  - id: "gpt-4o"
    provider: "openai"
    model: "gpt-4o"
    access: "api"
    cost_per_1k_tokens: 0.015
    priority: 1
    enabled: true

  # ---- Local judges (served via vLLM) ----------------------------------
  - id: "mistral-7b-local"
    provider: "local"
    model: "unsloth/Mistral-7B-v0.3-GGUF"
    access: "vllm"
    vllm_port: 8000
    cost_per_1k_tokens: 0.0
    priority: 2
    enabled: true

  - id: "llama-7b-local"
    provider: "local"
    model: "unsloth/Llama-2-7b-GGUF"
    access: "vllm"
    vllm_port: 8001
    cost_per_1k_tokens: 0.0
    priority: 2
    enabled: true

  # ---- Deterministic baseline ------------------------------------------
  - id: "heuristic-baseline"
    provider: "deterministic"
    access: "none"
    cost_per_1k_tokens: 0.0
    priority: 3
    enabled: true
