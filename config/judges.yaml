# config/judges.yaml
#
# Judge panel configuration (PRD v3.1).
#
# Every judge implements the same Judge.evaluate() contract. Remote judges call a
# hosted API; local judges load their GGUF checkpoint IN-PROCESS via llama.cpp
# (harness/llamacpp_engine.py); the heuristic baseline is deterministic and
# in-process.
#
# `access` values:
#   api      -> hosted provider endpoint (Anthropic / OpenAI / Replicate)
#   llamacpp -> local GGUF loaded IN-PROCESS via llama.cpp (pins a specific quant
#               via `gguf_file`, loads sequentially; no server, no port)
#   none     -> deterministic, no network call
#
# `priority` is used by the panel to select a subset when running cheap/fast
# pilots (lower number = run first / always). See PRD "Decision 3: Judge
# Placement".

judges:
  # ---- Remote judges (hosted API) --------------------------------------
  - id: "claude-sonnet-4-6"
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    access: "api"
    cost_per_1k_tokens: 0.003
    priority: 1
    enabled: true

  - id: "gpt-4o"
    provider: "openai"
    model: "gpt-4o"
    access: "api"
    cost_per_1k_tokens: 0.015
    priority: 1
    enabled: true

  # ---- Local judges (served IN-PROCESS via llama.cpp / GGUF) ------------
  # `gguf_file` pins one quant in the repo and also scopes hydration to it.
  - id: "mistral-7b-local"
    provider: "local"
    model: "unsloth/Mistral-7B-v0.3-GGUF"
    access: "llamacpp"
    gguf_file: "*Q4_K_M.gguf"
    cost_per_1k_tokens: 0.0
    priority: 2
    enabled: true

  - id: "llama-7b-local"
    provider: "local"
    model: "unsloth/Llama-2-7b-GGUF"
    access: "llamacpp"
    gguf_file: "*Q4_K_M.gguf"
    cost_per_1k_tokens: 0.0
    priority: 2
    enabled: true

  # ---- Deterministic baseline ------------------------------------------
  - id: "heuristic-baseline"
    provider: "deterministic"
    access: "none"
    cost_per_1k_tokens: 0.0
    priority: 3
    enabled: true
