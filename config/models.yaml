# config/models.yaml
#
# Model catalogue for the behavioral-invariance eval harness (PRD v3.1).
#
# Two roles are represented here:
#   * `local_models`  -- pre-quantized checkpoints served locally (llama.cpp / Ollama).
#   * `remote_models` -- API-hosted models (no local serving required).
#
# Everything is checkpoint-driven, NOT runtime-quantization-driven: the checkpoint
# version pins the exact behavior (see PRD "Why Pre-Quantized Checkpoints?").
#
# NOTE for Sam: the `fine_tuned` entries below are placeholders. Community GGUF
# conversions are not always available for fine-tuned variants -- fall back to a
# cloud provider (e.g. Replicate) where noted.

# Serving engines:
#   llamacpp -- DEFAULT. In-process GGUF via llama.cpp (harness/llamacpp_engine.py).
#               Pins one GGUF file via `serving.gguf_file` and loads models
#               sequentially (one resident at a time -- see hardware_profile.yaml
#               `llamacpp.max_resident`).
#   ollama   -- local Ollama daemon over HTTP (set `serving.ollama_tag`).
#
# `serving.gguf_file` is passed straight to Llama.from_pretrained(filename=...).
# Prefer the EXACT file name (as in HuggingFace's "Use this model" snippet), e.g.
#   gguf_file: "Mistral-7B-v0.3.Q4_K_M.gguf"
# An exact name is reproducible and unambiguous; a glob ("*Q4_K_M.gguf") is also
# accepted -- handy when you don't want to hardcode the full name -- and is what
# the shipped entries below use. Hydration downloads through llama-cpp-python
# (Llama.from_pretrained), so it fetches exactly the file the engine will load --
# never the whole repo of quants -- and fails loudly if the name is wrong.
# `additional_files` fetches extra parts (e.g. split-GGUF shards) alongside it.
local_models:
  - id: "mistral-7b-4bit"
    checkpoint: "unsloth/Mistral-7B-v0.3-GGUF"   # pre-quantized GGUF repo
    quantization: "4-bit"
    size_gb: 4.2
    context_tokens: 32768
    serving:
      engine: "llamacpp"              # llamacpp (in-process GGUF) | ollama
      gguf_file: "*Q4_K_M.gguf"       # glob; or an exact name like the example above
      ollama_tag: "mistral:7b"

  - id: "llama-2-7b-4bit"
    checkpoint: "unsloth/Llama-2-7b-GGUF"         # pre-quantized GGUF repo
    quantization: "4-bit"
    size_gb: 4.1
    context_tokens: 4096
    serving:
      engine: "llamacpp"
      gguf_file: "*Q4_K_M.gguf"
      ollama_tag: "llama2:7b"

  # Example: an exact GGUF file name, per HuggingFace's llama.cpp snippet. This is
  # the recommended form. Uncomment to evaluate it (BF16 ~18GB -- check memory).
  # - id: "qwythos-9b"
  #   checkpoint: "empero-ai/Qwythos-9B-Claude-Mythos-5-1M-GGUF"
  #   context_tokens: 32768
  #   serving:
  #     engine: "llamacpp"
  #     gguf_file: "Qwythos-9B-Claude-Mythos-5-1M-BF16.gguf"

# Fine-tuned variants under evaluation. GGUF may not exist -> use a cloud provider.
fine_tuned_models:
  - id: "qwen-coder-7b"
    checkpoint: "Qwen/Qwen2.5-Coder-7B"
    quantization: "none"
    provider: "replicate"   # cloud-based; no local GGUF assumed
    context_tokens: 32768

# API-hosted models. Called over HTTPS; never served locally.
remote_models:
  - id: "claude-sonnet-4-6"
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    access: "api"

  - id: "gpt-4o"
    provider: "openai"
    model: "gpt-4o"
    access: "api"

  - id: "llama-3.1-70b"
    provider: "replicate"
    model: "meta/meta-llama-3.1-70b-instruct"
    access: "api"           # too large for local serving on 32GB
